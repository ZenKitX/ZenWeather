name: CI - 代码质量检查

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  analyze:
    name: 代码分析
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 验证格式
        run: flutter format --set-exit-if-changed .
      
      - name: 代码分析
        run: flutter analyze
      
      - name: 运行测试
        run: flutter test --coverage
      
      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  build-android:
    name: 构建 Android APK
    runs-on: ubuntu-latest
    needs: analyze
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 构建 APK
        run: flutter build apk --release
      
      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  build-ios:
    name: 构建 iOS IPA
    runs-on: macos-latest
    needs: analyze
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 构建 iOS (无签名)
        run: flutter build ios --release --no-codesign
      
      - name: 创建 IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app-release.ipa Payload
      
      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: app-release.ipa
          retention-days: 7

  build-web:
    name: 构建 Web 应用
    runs-on: ubuntu-latest
    needs: analyze
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: 获取依赖
        run: flutter pub get
      
      - name: 构建 Web
        run: flutter build web --release
      
      - name: 上传 Web 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 7
