name: zen_weather
description: 一个充满禅意的天气应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  get: ^4.6.6
  
  # 网络请求
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # 响应式布局
  flutter_screenutil: ^5.9.0
  
  # 定位服务
  location: ^5.0.3
  
  # UI 组件
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # 动画
  flutter_animate: ^4.5.0
  lottie: ^3.0.0
  
  # 工具类
  intl: ^0.19.0
  logger: ^2.0.2+1
  
  # 字体
  google_fonts: ^6.1.0
  
  # 图标
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# 应用图标配置
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#F5F5F0"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  # 如果需要自定义字体，可以在这里配置
  # fonts:
  #   - family: ZenFont
  #     fonts:
  #       - asset: assets/fonts/ZenFont-Regular.ttf
